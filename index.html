    <script>
      // Remove loader when app mounts
      window.addEventListener('DOMContentLoaded', function() {
        var check = setInterval(function() {
          if (document.getElementById('root') && document.getElementById('root').children.length > 0) {
            clearInterval(check);
            var loader = document.getElementById('global-loader');
            if (loader) { loader.style.opacity = '0'; setTimeout(function() { loader.remove(); }, 500); }
          }
        }, 100);
        // Fallback: remove after 5s; show error message if root is still empty (app failed to boot)
        setTimeout(function() {
          var loader = document.getElementById('global-loader');
          var root = document.getElementById('root');
          if (loader) {
            var appLoaded = root && root.children.length > 0;
            if (!appLoaded) {
              // App failed to mount — show a user-facing error rather than blank page
              loader.innerHTML = '<div style="text-align:center;padding:24px"><p style="color:rgba(255,255,255,0.9);font-family:sans-serif;font-size:16px;margin-bottom:12px">Sayfa yüklenemedi.</p><button onclick="location.reload()" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer">Tekrar Dene</button></div>';
            } else {
              loader.style.opacity = '0';
              setTimeout(function() { loader.remove(); }, 500);
            }
          }
        }, 5000);
      });
    </script>
